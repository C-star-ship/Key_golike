<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CHECK KEY</title>

<style>

body{
background:black;
color:#0f0;
font-family:monospace;
text-align:center;
padding-top:100px;
}

input{
width:300px;
padding:12px;
background:#111;
border:1px solid #0f0;
color:#0f0;
}

button{
padding:12px 20px;
margin-top:10px;
background:#0f0;
border:none;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
color:#0ff;
}

</style>

</head>

<body>

<h2>CHECK KEY</h2>

<p>key =</p>

<input id="key" placeholder="Nhập key">

<br>

<button onclick="check()">CHECK</button>

<div class="result" id="result"></div>

<script>

function check(){

let key=document.getElementById("key").value

if(!key){
document.getElementById("result").innerText="❌ Chưa nhập key"
return
}

let parts=key.split("-")

if(parts.length<3){
document.getElementById("result").innerText="❌ Key không hợp lệ"
return
}

let type=parts[0]
let expire=parseInt(parts[parts.length-1])

let now=Date.now()

if(now>expire){
document.getElementById("result").innerText="⛔ Key đã hết hạn"
return
}

let remain=Math.floor((expire-now)/3600000)

document.getElementById("result").innerText=
"✅ VALID | type = "+type+" | còn "+remain+" giờ"

}

</script>

</body>
</html>
