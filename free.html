<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FREE KEY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:black;
overflow:hidden;
}

/* MATRIX */

canvas{
position:fixed;
top:0;
left:0;
}

/* CARD */

.box{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:95%;
max-width:650px;

padding:70px 40px;

background:rgba(0,0,0,0.9);

border-radius:25px;

border:3px solid #00ff00;

box-shadow:
0 0 40px #00ff00,
0 0 120px #00ff00;

text-align:center;

}

/* TITLE */

.title{

color:#00ff00;

font-size:40px;

margin-bottom:40px;

}

/* BUTTON */

.btn{

width:100%;

padding:22px;

font-size:22px;

background:#00ff00;

border:none;

border-radius:12px;

margin-top:20px;

font-weight:bold;

cursor:pointer;

}


/* KEY */

.key{

margin-top:25px;

color:#00ffff;

font-size:18px;

word-break:break-all;

}

/* EXPIRE */

.exp{

color:#aaa;

font-size:14px;

margin-top:8px;

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="title">FREE KEY</div>

<button class="btn" onclick="bypass()">GET KEY</button>

<div class="key" id="key"></div>

<div class="exp" id="expire"></div>

<button class="btn" onclick="copyKey()">COPY KEY</button>

</div>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01"
const font=16
const columns=canvas.width/font
const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=font+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*font,drops[i]*font)

if(drops[i]*font>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* DEVICE */

function getDevice(){

let id=localStorage.getItem("device")

if(!id){

id=Math.random().toString(36).substring(2)

localStorage.setItem("device",id)

}

return id

}

/* BYPASS */

function bypass(){

let done=localStorage.getItem("bypass")

let today=new Date().toDateString()

if(done!=today){

localStorage.setItem("return","1")

window.location="https://link4m.net/N4WJcnr?redirect=https://c-star-ship.github.io/Key_golike/free.html"

return

}

generateKey()

}

/* SHA256 */

async function sha256(text){

const msg=new TextEncoder().encode(text)

const hash=await crypto.subtle.digest("SHA-256",msg)

return Array.from(new Uint8Array(hash))
.map(b=>b.toString(16).padStart(2,"0"))
.join("")

}

/* CREATE KEY */

async function generateKey(){

let device=getDevice()

let today=new Date().toISOString().slice(0,10)

let raw=device+today

let hash=await sha256(raw)

let expire=Date.now()+86400000

let key="FREE-"+hash.substring(0,8).toUpperCase()+"-"+expire

document.getElementById("key").innerText="key = "+key

document.getElementById("expire").innerText=
"expire = "+new Date(expire).toLocaleString()

}

/* COPY */

function copyKey(){

let k=document.getElementById("key").innerText

navigator.clipboard.writeText(k)

alert("Copied!")

}

/* RETURN FROM BYPASS */

if(localStorage.getItem("return")){

localStorage.removeItem("return")

localStorage.setItem("bypass",new Date().toDateString())

generateKey()

}

</script>

</body>
</html>
