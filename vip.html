<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>VIP KEY GENERATOR</title>

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

/* MATRIX CANVAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CENTER BOX */

.box{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:92%;
max-width:420px;

background:#000;
padding:35px;

border-radius:18px;

border:2px solid #00ff00;

box-shadow:
0 0 20px #00ff00,
0 0 60px #00ff00;

text-align:center;

}

/* TITLE */

.title{

font-size:26px;
margin-bottom:25px;

}

/* INPUT */

input{

width:90%;
padding:12px;

font-size:18px;

background:black;
color:#00ff00;

border:2px solid #00ff00;

border-radius:10px;

outline:none;

text-align:center;

margin-bottom:20px;

}

/* BUTTON */

button{

width:90%;
padding:14px;

font-size:18px;

background:black;
color:#00ff00;

border:2px solid #00ff00;

border-radius:12px;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#00ff00;
color:black;

}

/* RESULT */

.result{

margin-top:25px;

font-size:18px;

word-break:break-all;

}

/* KEY BOX */

.keybox{

margin-top:15px;

padding:15px;

border:2px dashed #00ff00;

border-radius:10px;

font-size:18px;

}

/* COPY */

.copy{

margin-top:10px;

cursor:pointer;

color:#00ffff;

}

.copy:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="title">VIP KEY GENERATOR</div>

<input id="days" type="number" placeholder="Nhập số ngày (ví dụ 30)">

<br>

<button onclick="createKey()">CREATE KEY</button>

<div class="result" id="result"></div>

</div>

<script>

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix")

const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ"

const fontSize=14

const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0F0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* KEY GENERATOR */

function createKey(){

let days=document.getElementById("days").value

if(!days || days<=0){

alert("Nhập số ngày hợp lệ")

return

}

let rand=Math.random().toString(36).substring(2,10).toUpperCase()

let expire=Date.now()+days*86400000

let key="VIP-"+rand+"-"+expire

document.getElementById("result").innerHTML=

`
day=${days}

<div class="keybox">${key}</div>

<div class="copy" onclick="copyKey('${key}')">
CLICK TO COPY
</div>
`

}

/* COPY */

function copyKey(k){

navigator.clipboard.writeText(k)

alert("Đã copy key!")

}

</script>

</body>
</html>
