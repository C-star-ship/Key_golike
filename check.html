<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CHECK KEY</title>

<style>

body{
background:black;
color:#00ff9f;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#000;
padding:40px;
border-radius:15px;
border:2px solid #00ff9f;

box-shadow:
0 0 20px #00ff9f,
0 0 60px #00ff9f;

text-align:center;
width:90%;
max-width:420px;
}

.title{
font-size:26px;
margin-bottom:20px;
}

.result{
margin-top:20px;
font-size:18px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="box">

<div class="title">CHECK KEY</div>

<div class="result" id="result">
CHECKING...
</div>

</div>

<script>

/* API worker */

const API="https://YOUR-WORKER.workers.dev/check"

/* lấy key từ URL */

const params=new URLSearchParams(location.search)

const key=params.get("key")

if(!key){

document.getElementById("result").innerText="❌ NO KEY"

}else{

checkKey(key)

}

function checkKey(key){

fetch(API+"?key="+key)

.then(r=>r.text())

.then(data=>{

if(data==="VALID"){

document.getElementById("result").innerText=
"✅ KEY VALID\n\n"+key

}else{

document.getElementById("result").innerText=
"⛔ INVALID KEY"

}

})

.catch(()=>{

document.getElementById("result").innerText=
"⚠ API ERROR"

})

}

</script>

</body>
</html>
