<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHECK KEY</title>

<style>

body{
background:black;
color:#0f0;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{

background:#000;
padding:40px;

border:2px solid #0f0;
border-radius:15px;

box-shadow:0 0 30px #0f0;

text-align:center;

width:90%;
max-width:420px;

}

.result{

margin-top:20px;
color:#0ff;
font-size:18px;

word-break:break-all;

}

</style>

</head>

<body>

<div class="box">

<h2>CHECK KEY</h2>

<div class="result" id="result"></div>

</div>

<script>

let path = window.location.pathname

let parts = path.split("/")

let keyPart = parts.find(p=>p.startsWith("key="))

let key = keyPart ? keyPart.split("=")[1] : null

if(!key){

document.getElementById("result").innerText="Không có key"

}else{

let arr = key.split("-")

let expire = parseInt(arr[arr.length-1])

let now = Date.now()

if(now > expire){

document.getElementById("result").innerText="❌ KEY EXPIRED"

}else{

let hours = Math.floor((expire-now)/3600000)

document.getElementById("result").innerText =
"✅ VALID\n\n"+
"key = "+key+"\n"+
"còn = "+hours+" giờ"

}

}

</script>

</body>
</html>
