<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHECK KEY</title>
</head>

<body>

<pre id="result">INVALID</pre>

<script>

const params = new URLSearchParams(location.search)
const key = params.get("key")

if(key){

let parts = key.split("-")

if(parts.length >= 3){

let expire = parseInt(parts[parts.length-1])

if(Date.now() < expire){

document.getElementById("result").innerText="VALID"

}

}

}

</script>

</body>
</html>
