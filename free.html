<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FREE KEY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:black;
overflow:hidden;
color:#0f0;
}

/* matrix */

canvas{
position:fixed;
top:0;
left:0;
}

/* card */

.box{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:90%;
max-width:420px;

padding:45px;

background:rgba(0,0,0,0.9);

border:2px solid #0f0;
border-radius:18px;

text-align:center;

box-shadow:
0 0 20px #0f0,
0 0 60px #0f0;

}

/* title */

h2{

font-size:28px;
margin-bottom:25px;

}

/* button */

button{

width:100%;

padding:16px;

margin-top:10px;

font-size:16px;

background:#00ff00;

border:none;

border-radius:8px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

box-shadow:0 0 20px #0f0;

transform:scale(1.05);

}

/* key */

.key{

margin-top:25px;

font-size:18px;

color:#0ff;

word-break:break-all;

}

/* expire */

.exp{

font-size:14px;

margin-top:8px;

color:#aaa;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<h2>FREE KEY</h2>

<button onclick="bypass()">GET KEY</button>

<div class="key" id="keybox"></div>

<div class="exp" id="expire"></div>

<button onclick="copyKey()">COPY KEY</button>

</div>

<script>

/* matrix */

const c=document.getElementById("matrix")
const ctx=c.getContext("2d")

c.height=window.innerHeight
c.width=window.innerWidth

const letters="01"
const size=16
const columns=c.width/size
const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,c.width,c.height)

ctx.fillStyle="#0f0"
ctx.font=size+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*size,drops[i]*size)

if(drops[i]*size>c.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* device id */

function getDevice(){

let id=localStorage.getItem("device")

if(!id){

id=Math.random().toString(36).substring(2)

localStorage.setItem("device",id)

}

return id

}

/* bypass */

function bypass(){

let done=localStorage.getItem("bypass")

let today=new Date().toDateString()

if(done!=today){

localStorage.setItem("return","1")

window.location="https://linkvertise.com/your-link"

return

}

generateKey()

}

/* generate key */

async function generateKey(){

let device=getDevice()

let today=new Date().toISOString().slice(0,10)

let raw=device+today

let hash=await sha256(raw)

let expire=Date.now()+86400000

let key="FREE-"+hash.substring(0,8).toUpperCase()+"-"+expire

document.getElementById("keybox").innerText="key = "+key

document.getElementById("expire").innerText=
"expire = "+new Date(expire).toLocaleString()

}

/* sha256 */

async function sha256(text){

const msg=new TextEncoder().encode(text)

const hash=await crypto.subtle.digest("SHA-256",msg)

return Array.from(new Uint8Array(hash))
.map(b=>b.toString(16).padStart(2,"0"))
.join("")

}

/* copy */

function copyKey(){

let k=document.getElementById("keybox").innerText

navigator.clipboard.writeText(k)

alert("Copied!")

}

/* return bypass */

if(localStorage.getItem("return")){

localStorage.removeItem("return")

localStorage.setItem("bypass",new Date().toDateString())

generateKey()

}

</script>

</body>
</html>
