<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP KEY</title>

<style>

body{
background:black;
color:#0f0;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{

background:#000;
padding:40px;

border:2px solid #0f0;
border-radius:15px;

box-shadow:0 0 30px #0f0;

text-align:center;

width:90%;
max-width:420px;

}

.result{

margin-top:20px;
color:#0ff;
font-size:18px;

word-break:break-all;

}

</style>

</head>

<body>

<div class="box">

<h2>VIP KEY</h2>

<div class="result" id="result"></div>

</div>

<script>

let path = window.location.pathname

let parts = path.split("/")

let dayPart = parts.find(p=>p.startsWith("day="))
let keyPart = parts.find(p=>p.startsWith("key="))

let day = dayPart ? dayPart.split("=")[1] : "?"
let key = keyPart ? keyPart.split("=")[1] : "?"

document.getElementById("result").innerText =
"day = "+day+"\n\nkey = "+key

</script>

</body>
</html>
