<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FREE KEY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:black;
font-family:monospace;
overflow:hidden;
color:#0f0;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

z-index:2;

text-align:center;

width:90%;
max-width:420px;

padding:40px;

background:#000;

border-radius:15px;

border:2px solid #00ff00;

box-shadow:
0 0 25px #00ff00,
0 0 80px #00ff00;

}

.title{
font-size:28px;
margin-bottom:20px;
}

button{

width:100%;
padding:14px;

margin-top:15px;

font-size:16px;

background:#00ff00;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}

.key{

margin-top:15px;
color:#0ff;
word-break:break-all;

}

.timer{
margin-top:10px;
color:#fff;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="title">FREE KEY</div>

<button onclick="bypass()">GET KEY</button>

<div class="key" id="key"></div>

<div class="timer" id="timer"></div>

<button onclick="copyKey()">COPY KEY</button>

</div>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01"
const fontSize=14
const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* RANDOM */

function random(len){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

let s=""

for(let i=0;i<len;i++)
s+=chars[Math.floor(Math.random()*chars.length)]

return s

}

/* GENERATE KEY */

function generateKey(){

let saved=localStorage.getItem("free_key")

if(saved){

document.getElementById("key").innerText="key = "+saved
startTimer()
return

}

let expire=Date.now()+86400000

let key="FREE-"+random(8)+"-"+expire

localStorage.setItem("free_key",key)

document.getElementById("key").innerText="key = "+key

startTimer()

}

/* TIMER */

function startTimer(){

let key=localStorage.getItem("free_key")

if(!key) return

let expire=parseInt(key.split("-")[2])

function update(){

let diff=expire-Date.now()

if(diff<=0){

localStorage.removeItem("free_key")
localStorage.removeItem("bypass")

document.getElementById("timer").innerText="Key reset!"

return

}

let h=Math.floor(diff/3600000)
let m=Math.floor(diff%3600000/60000)
let s=Math.floor(diff%60000/1000)

document.getElementById("timer").innerText=
"reset in "+h+"h "+m+"m "+s+"s"

}

setInterval(update,1000)

}

/* COPY */

function copyKey(){

let key=localStorage.getItem("free_key")

if(!key){
alert("No key")
return
}

navigator.clipboard.writeText(key)

alert("Copied!")

}

/* BYPASS */

function bypass(){

let today=new Date().toDateString()

let done=localStorage.getItem("bypass")

let back=localStorage.getItem("return")

if(back==="1"){

localStorage.removeItem("return")

localStorage.setItem("bypass",today)

generateKey()

return

}

if(done===today){

generateKey()

return

}

localStorage.setItem("return","1")

window.location.href="https://link4m.net/N4WJcnr"

}

</script>

</body>
</html>
