<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Free Key</title>

<style>

body{
margin:0;
background:black;
color:#00ff9f;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.box{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:92%;
max-width:420px;

padding:35px;

text-align:center;

background:rgba(0,0,0,0.85);

border:2px solid #00ff9f;
border-radius:15px;

box-shadow:
0 0 20px #00ff9f,
0 0 60px #00ff9f;

}

.title{
font-size:26px;
margin-bottom:20px;
}

.keybox{

margin-top:20px;

padding:18px;

border:2px dashed #00ff9f;

border-radius:10px;

font-size:20px;

word-break:break-all;

}

.copy{

margin-top:10px;

cursor:pointer;

color:#00ffff;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="title">FREE KEY</div>

<div id="result">Checking access...</div>

</div>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01"

const fontSize=14

const columns=canvas.width/fontSize

const drops=[]

for(let x=0;x<columns;x++) drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.random()*letters.length)

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* VERIFY TOKEN */

const params=new URLSearchParams(location.search)

const token=params.get("token")

const saved=localStorage.getItem("unlock_token")

if(!token || token!==saved){

document.getElementById("result").innerText="ACCESS DENIED"

throw "no access"

}

/* KEY SYSTEM */

let last=localStorage.getItem("free_time")

let now=Date.now()

if(last && now-last<86400000){

let remain=86400000-(now-last)

let h=Math.floor(remain/3600000)

document.getElementById("result").innerText=

"KEY ALREADY CLAIMED\nTRY AGAIN IN "+h+" HOURS"

}else{

let rand=Math.random().toString(36).substring(2,10).toUpperCase()

let expire=Date.now()+86400000

let key="FREE-"+rand+"-"+expire

localStorage.setItem("free_time",now)

document.getElementById("result").innerHTML=

`
<div class="keybox">${key}</div>

<div class="copy" onclick="copy('${key}')">
COPY KEY
</div>
`

}

function copy(k){

navigator.clipboard.writeText(k)

alert("Key copied")

}

</script>

</body>
</html>
