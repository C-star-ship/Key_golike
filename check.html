<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FREE KEY SYSTEM</title>

<style>

body{
margin:0;
background:black;
color:#00ff9f;
font-family:monospace;
text-align:center;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
margin-top:120px;
padding:20px;
}

.title{
font-size:28px;
margin-bottom:20px;
}

.keybox{
background:#000;
border:2px solid #00ff9f;
padding:20px;
border-radius:15px;
font-size:22px;
width:90%;
max-width:420px;
margin:auto;

box-shadow:
0 0 20px #00ff9f,
0 0 60px #00ff9f;

word-break:break-all;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:20px;
background:#00ff9f;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#00cc7a;
}

.copy{
margin-top:15px;
}

.timer{
margin-top:15px;
color:#ffff00;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="title">FREE KEY SYSTEM</div>

<div class="keybox" id="keyBox">
CLICK GET KEY
</div>

<button onclick="getKey()">GET KEY</button>

<div class="copy" id="copyBox"></div>

<div class="timer" id="timer"></div>

</div>

<script>

/* link rút gọn */

const shortLink="https://link4m.net/N4WJcnr"

/* API worker */

const api="https://YOUR-WORKER.workers.dev/key"

/* lấy key */

function getKey(){

window.open(shortLink,"_blank")

document.getElementById("keyBox").innerText="WAITING..."

setTimeout(()=>{

fetch(api)
.then(r=>r.text())
.then(key=>{

localStorage.setItem("user_key",key)

document.getElementById("keyBox").innerText=key

document.getElementById("copyBox").innerHTML=
'<button onclick="copyKey()">COPY KEY</button>'

startTimer(key)

})

},8000)

}

/* copy key */

function copyKey(){

let key=document.getElementById("keyBox").innerText

navigator.clipboard.writeText(key)

document.getElementById("copyBox").innerHTML="COPIED ✔"

}

/* timer */

function startTimer(key){

let parts=key.split("-")

let expire=parseInt(parts[parts.length-1])

setInterval(()=>{

let now=Date.now()

let remain=expire-now

if(remain<=0){

document.getElementById("timer").innerText="KEY EXPIRED"

return

}

let h=Math.floor(remain/3600000)
let m=Math.floor((remain%3600000)/60000)
let s=Math.floor((remain%60000)/1000)

document.getElementById("timer").innerText=
"RESET IN "+h+"h "+m+"m "+s+"s"

},1000)

}

/* nếu đã có key */

let saved=localStorage.getItem("user_key")

if(saved){

document.getElementById("keyBox").innerText=saved

startTimer(saved)

}

</script>

<script>

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="010101010101"
const fontSize=14
const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters.charAt(Math.floor(Math.random()*letters.length))

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,35)

</script>

</body>
</html>
