<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CHECK KEY</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#000;
padding:35px;
border-radius:15px;
border:2px solid #00ff00;

box-shadow:
0 0 20px #00ff00,
0 0 60px #00ff00;

text-align:center;
width:90%;
max-width:420px;
}

.title{
font-size:26px;
margin-bottom:20px;
}

.result{
margin-top:20px;
color:#00ffff;
font-size:18px;
word-break:break-all;
line-height:1.6;
}

.timer{
margin-top:15px;
color:#ffff00;
}

</style>
</head>

<body>

<div class="box">

<div class="title">CHECK KEY</div>

<div class="result" id="result">Đang kiểm tra...</div>

<div class="timer" id="timer"></div>

</div>

<script>

/* lấy key từ URL */

const params = new URLSearchParams(window.location.search)
const key = params.get("key")

const result = document.getElementById("result")
const timer = document.getElementById("timer")

if(!key){

result.innerText="❌ Không có key trong URL"
throw new Error("no key")

}

/* kiểm tra format */

const parts = key.split("-")

if(parts.length < 3){

result.innerText="❌ Key không hợp lệ"
throw new Error("bad key")

}

const type = parts[0]
const expire = parseInt(parts[parts.length-1])

if(isNaN(expire)){

result.innerText="❌ Key lỗi"
throw new Error("expire error")

}

/* kiểm tra thời gian */

function update(){

let now = Date.now()

if(now > expire){

result.innerText =
"⛔ KEY EXPIRED\n\n"+
"key = "+key

timer.innerText=""
return

}

let remain = expire - now

let hours = Math.floor(remain/3600000)
let minutes = Math.floor((remain%3600000)/60000)
let seconds = Math.floor((remain%60000)/1000)

let days = Math.floor(hours/24)

result.innerText =
"✅ VALID KEY\n\n"+
"type = "+type+"\n"+
"key = "+key+"\n"+
"còn = "+hours+" giờ ("+days+" ngày)"

timer.innerText =
"RESET SAU: "+
hours+"h "+minutes+"m "+seconds+"s"

}

update()

setInterval(update,1000)

</script>

</body>
</html>
