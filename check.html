<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHECK KEY</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{

background:#000;
padding:40px;

border-radius:15px;

border:2px solid #00ff00;

box-shadow:
0 0 25px #00ff00,
0 0 80px #00ff00;

text-align:center;

width:90%;
max-width:420px;

}

.title{
font-size:26px;
margin-bottom:20px;
}

.result{
margin-top:20px;
color:#00ffff;
font-size:18px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="box">

<div class="title">CHECK KEY</div>

<div class="result" id="result">Đang kiểm tra...</div>

</div>

<script>

/* lấy key từ URL */

const params = new URLSearchParams(window.location.search)

const key = params.get("key")

if(!key){

document.getElementById("result").innerText="❌ Không có key trong URL"

}else{

checkKey(key)

}

function checkKey(key){

let parts = key.split("-")

if(parts.length < 3){

document.getElementById("result").innerText="❌ Key không hợp lệ"
return

}

let type = parts[0]

let expire = parseInt(parts[parts.length-1])

let now = Date.now()

if(now > expire){

document.getElementById("result").innerText=
"⛔ KEY EXPIRED\n\nkey = "+key

return

}

let remain = expire - now

let hours = Math.floor(remain/3600000)

let days = Math.floor(hours/24)

document.getElementById("result").innerText=

"✅ VALID\n\n"+
"type = "+type+"\n"+
"key = "+key+"\n"+
"còn = "+hours+" giờ ("+days+" ngày)"

}

</script>

</body>
</html>
