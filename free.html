def check_key_online(key):
    try:

        parts = key.split("-")

        if len(parts) < 3:
            return False

        key_type = parts[0]

        if key_type not in ["FREE","VIP"]:
            return False

        expire = int(parts[-1])

        now = int(time.time()*1000)

        if now > expire:
            return False

        return True

    except:
        return False
