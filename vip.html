<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>XWORLD VIP KEY</title>

<style>

body{
margin:0;
background:black;
color:#0f0;
font-family:monospace;
overflow:hidden;
}

/* matrix */

canvas{
position:fixed;
top:0;
left:0;
}

/* card */

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.85);
padding:40px;
width:360px;
text-align:center;
border-radius:15px;
border:1px solid #0f0;
box-shadow:0 0 20px #0f0;
}

h1{
color:#0ff;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
border:1px solid #0f0;
color:#0f0;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#0f0;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 10px #0f0;
}

.result{
margin-top:20px;
font-size:18px;
color:#0ff;
word-break:break-all;
}

.copy{
background:#00bcd4;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="card">

<h1>VIP KEY GENERATOR</h1>

<input id="secret" placeholder="ADMIN SECRET">

<input id="days" type="number" placeholder="Số ngày VIP">

<button onclick="generateVIP()">TẠO VIP KEY</button>

<div class="result" id="result">
day = -
<br>
key = -
</div>

<button class="copy" onclick="copyKey()">COPY KEY</button>

</div>

<script>

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* RANDOM */

function random(len){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

let s=""

for(let i=0;i<len;i++){

s+=chars[Math.floor(Math.random()*chars.length)]

}

return s

}

/* GENERATE VIP */

function generateVIP(){

let secret=document.getElementById("secret").value

let days=parseInt(document.getElementById("days").value)

if(secret!=="ADMIN123"){

alert("Sai admin secret")

return

}

if(!days){

alert("Nhập số ngày")

return

}

let expire=Date.now()+days*86400000

let key="VIP-"+random(10)+"-"+expire

document.getElementById("result").innerHTML=

"day = "+days+
"<br>key = "+key

}

/* COPY */

function copyKey(){

let text=document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("Đã copy")

}

</script>

</body>
</html>
