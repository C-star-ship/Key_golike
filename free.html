<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FREE KEY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:black;
font-family:monospace;
overflow:hidden;
color:#00ff00;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.container{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:92%;
max-width:450px;

padding:35px;

text-align:center;

background:rgba(0,0,0,0.85);

border-radius:15px;

border:2px solid #00ff00;

box-shadow:
0 0 20px #00ff00,
0 0 60px #00ff00;

z-index:2;

}

.title{
font-size:28px;
margin-bottom:20px;
}

button{

width:100%;

padding:16px;

margin-top:15px;

font-size:17px;

font-weight:bold;

border:none;

border-radius:8px;

background:#00ff00;

cursor:pointer;

}

.keybox{

margin-top:20px;

padding:18px;

font-size:20px;

background:#000;

border:2px solid #00ff00;

border-radius:10px;

word-break:break-all;

color:#00ffff;

}

.timer{

margin-top:12px;

color:#fff;

font-size:15px;

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="title">FREE KEY</div>

<button onclick="bypass()">GET KEY</button>

<div class="keybox" id="keybox">NO KEY</div>

<div class="timer" id="timer"></div>

<button onclick="copyKey()">COPY KEY</button>

</div>

<script>

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff00"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* RANDOM KEY */

function random(len){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

let s=""

for(let i=0;i<len;i++)
s+=chars[Math.floor(Math.random()*chars.length)]

return s

}

/* GENERATE KEY */

function generateKey(){

let expire=Date.now()+86400000

let key="FREE-"+random(8)+"-"+expire

localStorage.setItem("free_key",key)

document.getElementById("keybox").innerText=key

startTimer()

}

/* TIMER */

function startTimer(){

let key=localStorage.getItem("free_key")

if(!key) return

let expire=parseInt(key.split("-")[2])

function update(){

let diff=expire-Date.now()

if(diff<=0){

localStorage.removeItem("free_key")
localStorage.removeItem("bypass")

document.getElementById("timer").innerText="Key expired"

return

}

let h=Math.floor(diff/3600000)
let m=Math.floor(diff%3600000/60000)
let s=Math.floor(diff%60000/1000)

document.getElementById("timer").innerText=
"reset in "+h+"h "+m+"m "+s+"s"

}

setInterval(update,1000)

}

/* COPY KEY */

function copyKey(){

let key=localStorage.getItem("free_key")

if(!key){
alert("No key")
return
}

navigator.clipboard.writeText(key)

alert("Copied key!")

}

/* BYPASS LINK4M */

function bypass(){

let key=localStorage.getItem("free_key")

if(key){

document.getElementById("keybox").innerText=key

startTimer()

return

}

let back=localStorage.getItem("back")

if(back==="1"){

localStorage.removeItem("back")

generateKey()

return

}

/* LINK4M */

localStorage.setItem("back","1")

window.location.href="https://link4m.net/go/N4WJcnr"

}

/* LOAD */

window.onload=function(){

let key=localStorage.getItem("free_key")

if(key){

document.getElementById("keybox").innerText=key

startTimer()

}

}

</script>

</body>
</html>
