<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FREE KEY</title>

<style>

body{
margin:0;
background:black;
color:#0f0;
font-family:monospace;
overflow:hidden;
}

/* matrix */

canvas{
position:fixed;
top:0;
left:0;
}

/* card */

.box{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:#000;
padding:40px;

border:1px solid #0f0;
border-radius:12px;

text-align:center;

box-shadow:0 0 25px #0f0;

}

/* button */

button{

padding:12px 25px;
margin-top:10px;

background:#0f0;
border:none;
font-weight:bold;
cursor:pointer;

}

/* key */

.key{

margin-top:15px;
color:#0ff;
font-size:18px;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<h2>FREE KEY</h2>

<button onclick="bypass()">GET KEY</button>

<div class="key" id="keybox"></div>

</div>

<script>

/* matrix */

const c=document.getElementById("matrix")
const ctx=c.getContext("2d")

c.height=window.innerHeight
c.width=window.innerWidth

const letters="01"
const size=14
const columns=c.width/size
const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,c.width,c.height)

ctx.fillStyle="#0f0"
ctx.font=size+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*size,drops[i]*size)

if(drops[i]*size>c.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)


/* device id */

function getDevice(){

let id=localStorage.getItem("device")

if(!id){

id=Math.random().toString(36).substring(2)

localStorage.setItem("device",id)

}

return id

}


/* bypass link */

function bypass(){

let done=localStorage.getItem("bypass_done")

let today=new Date().toDateString()

if(done!=today){

localStorage.setItem("return_after_bypass",1)

/* linkvertise */

window.location="https://linkvertise.com/your-link"

return

}

generateKey()

}


/* generate key */

async function generateKey(){

let device=getDevice()

let today=new Date().toISOString().slice(0,10)

let raw=device+today

let hash=await sha256(raw)

let key="FREE-"+hash.substring(0,8).toUpperCase()+"-"+Date.now()+86400000

document.getElementById("keybox").innerText="key = "+key

}


/* sha256 */

async function sha256(text){

const msg=new TextEncoder().encode(text)

const hash=await crypto.subtle.digest("SHA-256",msg)

return Array.from(new Uint8Array(hash))
.map(b=>b.toString(16).padStart(2,"0"))
.join("")

}


/* return from bypass */

if(localStorage.getItem("return_after_bypass")){

localStorage.removeItem("return_after_bypass")

localStorage.setItem("bypass_done",new Date().toDateString())

generateKey()

}

</script>

</body>
</html>
